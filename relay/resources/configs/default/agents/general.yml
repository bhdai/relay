name: general
description: "General-purpose coordinator for research, writing, analysis, and implementation tasks"
prompt:
  - prompts/agents/general.md
  - prompts/suffixes/environments.md
llm: default
checkpointer: sqlite
default: true
recursion_limit: 1000
tools:
  patterns:
    - impl:web:*
    - impl:file_system:read_file
    - impl:file_system:glob_files
    - impl:file_system:grep_files
    - impl:file_system:ls
    - internal:*:*
  output_max_tokens: 10000
subagents:
  - general-purpose
  - explorer
